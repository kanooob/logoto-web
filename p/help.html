<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Introuvable | Logoto</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kanooob/Logoto/refs/heads/main/Logoto.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #36393f; /* Fond sombre Discord */
            color: #ffffff;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #2f3136; /* Fond intérieur */
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .status-code {
            font-size: 8rem;
            font-weight: bold;
            color: #8c935d; /* Couleur de ton bot */
            margin-bottom: 5px;
            line-height: 1;
        }

        h1 {
            font-size: 1.8rem;
            color: #dcddde;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #b9bbbe;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            color: #ffffff;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background-color: #8c935d; /* Couleur de ton bot */
        }
        .btn-primary:hover {
            background-color: #767d4e; /* Version survol plus sombre */
        }

        @media (min-width: 400px) {
            .button-container {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-code">404</div>
        
        <h1>Oups, cette page a disparu.</h1>
        
        <p>
            Désolé, nous n'avons pas pu trouver la page que vous cherchez.<br>
            Utilisez le bouton ci-dessous pour revenir en lieu sûr.
        </p>
        
        <div class="button-container">
            <a href="/" class="btn btn-primary">
                Retour à l'accueil
            </a>
        </div>
    </div>
</body>
</html>
