<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informations Légales - Logoto</title>
    <meta name="description" content="Conditions Générales d'Utilisation (CGU) et Politique de Confidentialité du bot Discord Logoto.">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kanooob/logoto-web/refs/heads/main/icon.png">

    <style>
        :root {
            --blanc: #F2F3F5;
            --vert-olive: #8c935d;
            --vert-olive-dark: #767d4f;
            --vert-olive-clair: #a3ab72;
            --gris-discord: #36393f; 
            --gris-footer: #2f3136;
            --gris-item: #3a3d42;
            --gris-code: #484c52;
            --note-bg: #3c3a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--gris-discord);
            color: var(--blanc);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo-container:hover .logo-img {
            transform: rotate(15deg) scale(1.05);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            align-items: center;
        }

        .lang-container {
            position: relative;
            display: inline-block;
        }

        .lang-select {
            background: none;
            border: none;
            color: var(--blanc);
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            padding: 10px 5px;
            text-decoration: none;
        }

        .lang-dropdown {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background-color: var(--gris-footer);
            border: 1px solid var(--vert-olive);
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
            z-index: 10;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }

        .lang-dropdown a {
            display: block;
            color: var(--blanc);
            padding: 8px 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .lang-dropdown a:hover {
            background-color: var(--vert-olive);
        }

        .lang-container:hover .lang-dropdown,
        .lang-container:focus-within .lang-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 40px 50px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            width: 250px;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            padding-right: 40px;
            flex-shrink: 0;
        }

        .sidebar a {
            color: var(--blanc);
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            opacity: 0.6;
            transition: opacity 0.2s, color 0.2s, padding-left 0.2s;
            white-space: nowrap;
        }

        .sidebar a:hover, .sidebar a.active-link {
            opacity: 1;
            color: var(--vert-olive-clair);
            padding-left: 4px;
        }

        .divider {
            width: 2px;
            min-width: 2px;
            background-color: rgba(242, 243, 245, 0.15);
            align-self: stretch;
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .content-area {
            flex: 1;
            min-width: 0;
            padding-left: 40px;
            animation: fadeIn 0.4s ease-out;
        }

        .content-area h1 {
            font-size: 34px;
            color: var(--vert-olive-clair);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .content-area h2 {
            font-size: 26px;
            margin-top: 35px;
            margin-bottom: 15px;
            color: var(--vert-olive-clair);
            border-bottom: 1px solid rgba(242, 243, 245, 0.15);
            padding-bottom: 5px;
        }

        .content-area h3 {
            font-size: 18px;
            margin-top: 20px;
            margin-bottom: 10px;
            color: var(--blanc);
        }

        .content-area p {
            font-size: 16px;
            margin-bottom: 15px;
            opacity: 0.85;
        }

        ol, ul {
            padding-left: 20px;
            margin: 20px 0;
        }

        ol li, ul li {
            margin-bottom: 10px;
            font-size: 16px;
            opacity: 0.85;
        }

        ul {
            list-style-type: disc;
        }

        code {
            background-color: var(--gris-code);
            padding: 3px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
            color: #ffffff;
            font-weight: bold;
        }

        a {
            color: var(--vert-olive-clair);
            text-decoration: underline;
        }

        a:hover {
            color: var(--vert-olive);
        }

        .note {
            background-color: var(--note-bg);
            border-left: 5px solid var(--vert-olive);
            padding: 15px;
            margin-top: 25px;
            border-radius: 4px;
            color: #ffffff;
        }

        .note strong {
            color: var(--vert-olive-clair);
        }

        footer {
            background-color: var(--gris-footer);
            padding: 25px 50px;
            width: 100%;
            margin-top: auto;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            font-size: 14px;
            opacity: 0.7;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--blanc);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--vert-olive-clair);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
                flex-direction: column;
                gap: 20px;
            }

            .main-container {
                flex-direction: column;
                padding: 20px;
            }

            .sidebar {
                width: 100%;
                padding-right: 0;
                padding-bottom: 20px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
            }

            .divider {
                width: 100%;
                height: 2px;
                margin-bottom: 20px;
            }

            .content-area {
                padding-left: 0;
            }

            .footer-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>

            const contentArea = document.getElementById('doc-content');
            const data = legalData[currentLang][currentHash];
            contentArea.innerHTML = `<h1>${data.title}</h1>${data.html}`;
        }

        window.addEventListener("hashchange", updateLayoutAndContent);
        window.addEventListener("DOMContentLoaded", updateLayoutAndContent);
    </script>
</body>
</html>
