        }

            padding: 0;

        }

            letter-spacing: 1px;

            gap: 40px;
        }

            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: var(--blanc);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            opacity: 0.8;
            transition: opacity 0.2s, color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            opacity: 1;
            color: var(--vert-olive-clair);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lang-container {
            position: relative;
            display: inline-block;
        }

        .lang-select {
            background: none;
            border: none;
            color: var(--blanc);
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            padding: 10px 5px;
            text-decoration: none;
        }

        .lang-dropdown {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background-color: var(--gris-footer);
            border: 1px solid var(--vert-olive);
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
            z-index: 10;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }

        .lang-dropdown a {
            display: block;
            color: var(--blanc);
            padding: 8px 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .lang-dropdown a:hover {
            background-color: var(--vert-olive);
        }

        .lang-container:hover .lang-dropdown,
        .lang-container:focus-within .lang-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .btn-nav {
            background-color: var(--vert-olive);
            color: var(--blanc);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.2s;
        }

        .btn-nav:hover {
            background-color: var(--vert-olive-dark);
            transform: translateY(-1px);
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 40px 50px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {

            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            padding-right: 40px;
            flex-shrink: 0;
        }

            color: var(--blanc);
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            opacity: 0.6;
            transition: opacity 0.2s, color 0.2s, padding-left 0.2s;
            white-space: nowrap;

            color: var(--vert-olive-clair);
            padding-left: 4px;
        }

            font-size: 16px;

            min-width: 2px;
            background-color: rgba(242, 243, 245, 0.15);
            align-self: stretch;
            margin-bottom: 40px;
            flex-shrink: 0;

            min-width: 0;

            color: var(--vert-olive-clair);

            font-weight: 800;

            font-size: 26px;
            margin-top: 35px;
            margin-bottom: 15px;
            color: var(--vert-olive-clair);

            margin-bottom: 15px;

            padding: 0;
            margin: 20px 0;

            background-color: var(--gris-item);
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;

            padding: 3px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
            color: #ffffff;
            font-weight: bold;
            word-break: break-all;
            white-space: pre-wrap;

            margin-bottom: 15px;
            font-size: 16px;
        }

        ol ul {

            padding-left: 20px;
            margin-top: 5px;

        ol ul li {
            margin-bottom: 5px;
            font-size: 15px;
            opacity: 0.9;

            border-left: 5px solid var(--vert-olive);
            padding: 15px;
            margin-top: 25px;
            border-radius: 4px;
            color: #ffffff;

        .note strong {
            color: var(--vert-olive-clair);

            padding: 18px;
            margin: 25px 0;
            border-radius: 6px;
            color: #ffffff;

        }

        .warning-box strong {
            color: var(--warning-text-important);
            font-weight: 800;
        }

            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 25px 0;
        }

        .event-card {
            background-color: var(--gris-item);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 25px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .event-card h3 {
            color: var(--blanc);
            font-size: 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.2s ease;

            border-color: var(--vert-olive);
            background-color: rgba(140, 147, 93, 0.1);
        }

        .event-card:hover h3 {
            color: var(--vert-olive-clair);
        }

        .event-card.active-card {
            border-color: var(--vert-olive-clair);
            background-color: rgba(140, 147, 93, 0.15);
        }

        .event-card.active-card h3 {
            color: var(--vert-olive-clair);
        }

        .event-card p {
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 0;
        }

        .event-sub-content {
            background-color: var(--gris-footer);
            padding: 25px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid var(--vert-olive-clair);
            animation: fadeIn 0.3s ease-out;
        }

        .mini-tabs {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            align-items: center;
        }

        .mini-tab-btn {
            background-color: var(--gris-code);
            color: var(--blanc);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .mini-tab-btn:hover {
            background-color: var(--vert-olive);
        }

        .mini-tab-btn.active-mini {
            background-color: var(--vert-olive-clair);
            color: var(--gris-discord);
        }

        .mini-tab-content {
            background-color: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            width: 100%;
        }

        .mini-tab-content ol, .mini-tab-content ul {
            width: 100%;
        }

        .mini-tab-content li {
            width: 100%;
        }

        footer {
            background-color: var(--gris-footer);
            padding: 25px 50px;
            width: 100%;
            margin-top: auto;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            font-size: 14px;
            opacity: 0.7;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--blanc);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--vert-olive-clair);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
                flex-direction: column;
                gap: 20px;
            }

            nav {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .nav-links {
                justify-content: center;
                flex-wrap: wrap;
                gap: 20px;
            }

            .nav-right {
                width: 100%;
                justify-content: center;
            }

            .main-container {
                flex-direction: column;
                padding: 20px;
            }

            .sidebar {
                width: 100%;
                padding-right: 0;
                padding-bottom: 20px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
            }

            .divider {
                width: 100%;
                height: 2px;
                margin-bottom: 20px;
            }

            .content-area {
                padding-left: 0;
            }

            .event-grid {
                grid-template-columns: 1fr;
            }

            .footer-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>

                    <h1>General Mechanism</h1>
                    <p>Logoto autonomously monitors specific text channels within your Discord server to schedule and execute your aesthetic updates.</p>
                    
                    <div class="note" style="margin-bottom: 20px; background-color: #2b3a2e; border-left: 5px solid var(--vert-olive-clair);">
                        <strong>⏰ Schedule Time:</strong> All automated updates and verifications configured on your server are executed every single day precisely at <strong>00:00 UTC</strong>.
                    </div>

                    <h2>Priority Rules & Limits</h2>
                    <p>To guarantee server stability and comply with Discord API rate limits, Logoto applies strict daily rules:</p>
                    <ol>
                        <li><strong>One single change per type per day:</strong> The server name can change once a day, the logo once, the banner once, and the invite background once.</li>
                        <li><strong>Simultaneous modifications:</strong> It is entirely possible to change the logo AND the name (or any other element) on the exact same day. Both actions will execute at 00:00 UTC.</li>
                        <li><strong>Handling duplicates (Visual priority):</strong> If you accidentally created multiple channels for the same element on the same day (e.g., two <code>l-25-12</code> channels with different logos), <strong>the channel located highest in your Discord category list takes priority</strong> and will be applied by the bot.</li>
                    </ol>
                `
            },
            command: {
                title: "Logoto Bot Commands",
                getHtml: () => `
                    <h1>Logoto Bot Commands</h1>
                    <p>Discover the complete list of built-in features available directly through Discord's Slash Commands system:</p>
                    <ul class="command-list">
                        <li><code>/setup</code>: First command to run. Automatically creates the category and necessary channels (Logoto, log-logoto) for a quick start.</li>
                        <li><code>/add-an-event</code>: Automatically creates a scheduling channel with the correct format for your future events.</li>
                        <li><code>/help</code>: Displays the bot's command list (or this documentation page).</li>
                        <li><code>/info</code>: Returns all useful information regarding the current status of the bot.</li>
                        <li><code>/ping</code>: Get real-time latency between the bot and the Discord API.</li>
                        <li><code>/invite</code>: Get the official invitation link to add Logoto to your own server.</li>
                        <li><code>/support</code>: Join our support server to ask questions or get assistance.</li>
                    </ul>
                `
            },
            evenement: {
                title: "Add an Event",
                getHtml: () => `
                    <h1>Add an Event</h1>
                    <p>Select the graphical or text element you want to schedule automatically on your Discord server to display its detailed setup tutorial:</p>
                    
                    <div class="warning-box">
                        <strong>⚠️ WARNING CONCERNING IMAGES:</strong> Never copy image links directly from a Discord channel (Discord CDN links). These now include temporary security keys and <strong>expire within 24 to 48 hours</strong>. If the link expires before the event date, Logoto won't be able to fetch your image. Please refer to the <a href="#liens-images" style="color: var(--warning-text-important); font-weight: bold; text-decoration: underline;">Persistent Image Links</a> section to fix this issue.
                    </div>

                    <div class="event-grid">
                        <div class="event-card ${selectedEventTab === 'event-logo' ? 'active-card' : ''}" onclick="switchEventTab('event-logo', this)">
                            <h3>Logo Change</h3>
                            <p>Automate your server profile picture update at a set date.</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-name' ? 'active-card' : ''}" onclick="switchEventTab('event-name', this)">
                            <h3>Name Change</h3>
                            <p>Automatically modify the display text name of your community.</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-banner' ? 'active-card' : ''}" onclick="switchEventTab('event-banner', this)">
                            <h3>Banner Change</h3>
                            <p>Schedule an illustration at the top of your channel list (Requires Boost Level 2).</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-invite' ? 'active-card' : ''}" onclick="switchEventTab('event-invite', this)">
                            <h3>Invite Background</h3>
                            <p>Customize the background image of your invite splash window (Requires Boost Level 1).</p>
                        </div>
                    </div>

                    <div id="event-sub-content-container">
                        ${eventTabsData[selectedEventTab]}
                    </div>
                `
            },
            "liens-images": {
                title: "Obtain a Persistent Image Link",
                getHtml: () => `
                    <h1>Obtain a Persistent Image Link</h1>
                    <p>For Logoto to apply your logos, banners, or invite backgrounds in the future, the URL you provide must remain permanently accessible. Since <strong>direct Discord links expire quickly</strong>, you must use a third-party permanent hosting solution.</p>
                    <p>Choose one of the recommended methods below to generate a valid permanent link:</p>
                    
                    <div class="mini-tabs">
                        <button class="mini-tab-btn ${selectedImageMethod === 'method-github' ? 'active-mini' : ''}" onclick="switchImageMethod('method-github', this)">GitHub (Recommended)</button>
                        <button class="mini-tab-btn ${selectedImageMethod === 'method-imgbb' ? 'active-mini' : ''}" onclick="switchImageMethod('method-imgbb', this)">ImgBB / Imgur</button>
                    </div>

                    <div id="image-method-container">
                        ${imageMethodsData[selectedImageMethod]}
                    </div>
                `
            }
        };

        // Render documentation based on the window location hash
        function renderContent() {
            const contentArea = document.getElementById('doc-content');
            let hash = window.location.hash.replace('#', '');
            
            // Map or handle specific IDs if they differ from the object keys
            if (hash === 'setup' || hash === '') hash = 'setup';
            
            const section = documentationData[hash];
            if (section) {
                contentArea.innerHTML = section.getHtml();
                updateActiveSidebarLink(hash);
            }
        }

        // Highlights the active page inside the sidebar
        function updateActiveSidebarLink(activeHash) {
            const links = document.querySelectorAll('#sidebar-menu a');
            links.forEach(link => {
                const hrefHash = link.getAttribute('href').replace('#', '');
                if (hrefHash === activeHash) {
                    link.classList.add('active-link');
                } else {
                    link.classList.remove('active-link');
                }
            });
        }

        // Switches specific event tabs dynamically inside the Event route
        function switchEventTab(tabId, cardElement) {
            selectedEventTab = tabId;
            
            // Manage visual selection
            const cards = document.querySelectorAll('.event-card');
            cards.forEach(card => card.classList.remove('active-card'));
            cardElement.classList.add('active-card');
            
            // Update container content
            const container = document.getElementById('event-sub-content-container');
            if (container) {
                container.innerHTML = eventTabsData[tabId];
            }
        }

        // Switches the permanent hosting guide method tab content area
        function switchImageMethod(methodId, btnElement) {
            selectedImageMethod = methodId;
            
            // Manage visual selection
            const buttons = document.querySelectorAll('.mini-tab-btn');
            buttons.forEach(btn => btn.classList.remove('active-mini'));
            btnElement.classList.add('active-mini');
            
            // Update container content
            const container = document.getElementById('image-method-container');
            if (container) {
                container.innerHTML = imageMethodsData[methodId];
            }
        }

        // Event Listeners for hash updates
        window.addEventListener('hashchange', renderContent);
        window.addEventListener('DOMContentLoaded', renderContent);
    </script>
</body>
</html>
