<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logoto Help & Commands</title>
    <meta name="description" content="Official configuration guide for the Logoto Discord bot. Explore all integrated commands (/setup, /help, /add-an-event) to effortlessly automate server icons, names, banners, and splashes.">
    <link rel="canonical" href="https://logoto.onrender.com/en/help">

    <link rel="alternate" hreflang="fr" href="https://logoto.onrender.com/fr/help">
    <link rel="alternate" hreflang="en" href="https://logoto.onrender.com/en/help">
    <link rel="alternate" hreflang="x-default" href="https://logoto.onrender.com/fr/help">

    <!-- Open Graph & Twitter SEO -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://logoto.onrender.com/en/help">
    <meta property="og:title" content="Help & Commands | Logoto Discord Bot">
    <meta property="og:description" content="The comprehensive step-by-step tutorial to configure your Discord server automation.">
    <meta property="og:image" content="https://raw.githubusercontent.com/kanooob/logoto-web/refs/heads/main/icon.png">
    <meta property="og:locale" content="en_US">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Help & Commands | Logoto Discord Bot">
    <meta name="twitter:description" content="The comprehensive step-by-step tutorial to configure your Discord server automation.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/kanooob/logoto-web/refs/heads/main/icon.png">

    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kanooob/logoto-web/refs/heads/main/icon.png">

    <!-- Liaison avec la feuille de style commune -->
    <link rel="stylesheet" href="../css/style-doc.css">

    <!-- JSON-LD Données structurées -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TechArticle",
      "headline": "Configuration Guide and Slash Commands for Logoto Bot",
      "description": "Learn how to easily deploy and run all Logoto actions to fully automate your Discord server's profiles, visual themes, and assets.",
      "image": "https://raw.githubusercontent.com/kanooob/logoto-web/refs/heads/main/icon.png",
      "inLanguage": "en-US",
      "author": {
        "@type": "Organization",
        "name": "Logoto",
        "url": "https://logoto.onrender.com"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Logoto",
        "logo": {
          "@type": "ImageObject",
          "url": "https://raw.githubusercontent.com/kanooob/logoto-web/refs/heads/main/icon.png"
        }
      }
    }
    </script>
</head>
<body>

    <header>
        <a href="/en" class="logo-container">
            <img src="https://raw.githubusercontent.com/kanooob/logoto-web/refs/heads/main/icon.png" alt="LOGOTO Logo" class="logo-img">
            <div class="logo-text">Logoto</div>
        </a>
        
        <nav aria-label="Main navigation">
            <ul class="nav-links">
                <li><a href="/en">Home</a></li>
                <li><a href="/en/help" class="active">Documentation</a></li>
                <li><a href="https://discord.com/invite/TPXFVYVnXe" target="_blank" rel="noopener noreferrer">Support</a></li>
            </ul>
            
            <div class="nav-right">
                <div class="lang-container">
                    <button class="lang-select">EN ↓</button>
                    <div class="lang-dropdown">
                        <a href="/fr/help">FR</a>
                    </div>
                </div>
                <a href="https://discord.com/oauth2/authorize?client_id=1119293847562919936" target="_blank" rel="noopener noreferrer" class="btn-nav">Add the bot</a>
            </div>
        </nav>
    </header>

    <div class="main-container">
        <aside class="sidebar" id="sidebar-menu">
            <a href="#setup" class="setup">Setup</a>
            <a href="#how-it-works">How It Works</a>
            <a href="#commands">Commands</a>
            <a href="#events">Add an Event</a>
            <a href="#links">Image Links</a>
        </aside>

        <div class="divider"></div>

        <main class="content-area" id="doc-content">
            <!-- Rempli dynamiquement via le script JavaScript ci-dessous -->
        </main>
    </div>

    <footer>
        <div class="footer-content">
            <p>This website is hosted on Render. Logoto is a personal project.</p>
            <div class="footer-links">
                <a href="/en/legal#tos">Terms of Service (ToS)</a>
                <a href="/en/legal#privacy">Privacy Policy</a>
                <a href="https://github.com/kanooob/Logoto" target="_blank" rel="noopener noreferrer">Source Code</a>
            </div>
        </div>
    </footer>

    <script>
        let selectedEventTab = 'event-logo';
        let selectedImageMethod = 'method-github';

        const documentationData = {
            setup: {
                title: "Configuration (Setup)",
                getHtml: () => `
                    <p>Logoto is a specialized bot designed to automate changing your Discord server's icon, name, banner, and invite splash backgrounds without requiring complex setup structures or lines of code.</p>
                    <h2>Getting Started</h2>
                    <p>To begin utilizing the bot to its full capacity, simply run the initial server deployment command.</p>
                    <ul class="command-list">
                        <li><code>/setup</code> : The essential first command. Automatically builds the required category and logging channels (Logoto, log-logoto) for a quick launch.</li>
                    </ul>
                    <div class="note">
                        <strong>IMPORTANT NOTE:</strong> The channel named <code>log-logoto</code> <strong>must exist</strong> on your server to handle automatic operation diagnostics.
                        <br><br>
                        The bot uses this channel to post daily engineering load logs (<code>l-Loading</code>, <code>n-Loading</code>, <code>b-Loading</code>, or <code>i-Loading</code>). Note that <strong>these updates are only generated if an automated asset swap is actively scheduled for that specific date</strong>. If no event is registered, no text is sent. The <code>/setup</code> command configures this safely for you.
                    </div>
                `
            },
            "how-it-works": {
                title: "General Workflow",
                getHtml: () => `
                    <p>Logoto autonomously scans for the presence of specific scheduled text channels inside your Discord server to index, stage, and execute your visual updates.</p>
                    
                    <div class="note" style="margin-bottom: 20px; background-color: #2b3a2e; border-left: 5px solid var(--vert-olive-clair);">
                        <strong>Cron Schedule:</strong> All automated verifications and server adjustments apply systematically every day at exactly <strong>00:00 UTC</strong>.
                    </div>

                    <h2>Priority Rules & Limitations</h2>
                    <p>To preserve server stability and comply with standard Discord API rate limits, Logoto follows specific handling parameters:</p>
                    <ol>
                        <li><strong>One alteration per asset type daily:</strong> The server name can change once per day, the server icon once, the banner once, and the invitation background splash once.</li>
                        <li><strong>Simultaneous edits:</strong> You can perfectly combine icon adjustments AND a server name update (or any other type) on the exact same calendar date. Both updates execute at 00:00 UTC.</li>
                        <li><strong>Duplicate channels (Visual Priority):</strong> If you accidentially build multiple channels for the same asset type on the same date (e.g., two <code>l-25-12</code> channels containing different icons), <strong>the channel nested highest up in your Discord category list takes absolute priority</strong> and its asset will be applied.</li>
                    </ol>
                `
            },
            commands: {
                title: "Logoto Bot Commands",
                getHtml: () => `
                    <p>Explore the complete list of built-in features accessible straight out of the box using Discord's official Slash Commands:</p>
                    <ul class="command-list">
                        <li><code>/setup</code> : The essential first command. Automatically builds the required category and logging channels (Logoto, log-logoto) for a quick launch.</li>
                        <li><code>/add-an-event</code> : Instantly creates a formatting-compliant text channel to schedule your future visual updates.</li>
                        <li><code>/help</code> : Displays the operational dashboard commands directory (or opens this index).</li>
                        <li><code>/info</code> : Returns technical data regarding the engine's real-time operational status and cluster health.</li>
                        <li><code>/ping</code> : Tests connection latency between the bot framework and Discord's internal API gateways.</li>
                        <li><code>/invite</code> : Fetches the official authorization link to introduce Logoto to your own community servers.</li>
                        <li><code>/support</code> : Points to our central support server where you can request live technical assistance.</li>
                    </ul>
                `
            },
            events: {
                title: "Add an Event",
                getHtml: () => `
                    <p>Select a graphic or textual element below to display its detailed step-by-step scheduling implementation guide:</p>
                    
                    <div class="warning-box">
                        <strong>ASSET LINK WARNING:</strong> Never copy direct image URLs straight out of a Discord text channel chat window (Discord CDN URLs). These internal addresses use temporary encryption hashes and <strong>will expire completely within 24 to 48 hours</strong>. If the link breaks before your scheduled date arrives, Logoto will fail to load the image. Refer to the <a href="#links" style="color: var(--warning-text-important); font-weight: bold; text-decoration: underline;">Image Links</a> section to resolve this.
                    </div>

                    <div class="event-grid">
                        <div class="event-card ${selectedEventTab === 'event-logo' ? 'active-card' : ''}" onclick="switchEventTab('event-logo', this)">
                            <h3>Server Icon</h3>
                            <p>Automate your server profile picture update on a precise date.</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-name' ? 'active-card' : ''}" onclick="switchEventTab('event-name', this)">
                            <h3>Server Name</h3>
                            <p>Automatically adjust the displayed structural text title of your community.</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-banner' ? 'active-card' : ''}" onclick="switchEventTab('event-banner', this)">
                            <h3>Server Banner</h3>
                            <p>Schedule illustrations to slide above your channel lists (Boost Level 2+ Required).</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-invite' ? 'active-card' : ''}" onclick="switchEventTab('event-invite', this)">
                            <h3>Invite Splash</h3>
                            <p>Personalize the backgrounds of your generic invite links (Boost Level 1+ Required).</p>
                        </div>
                    </div>

                    <div id="event-sub-content-container">
                        ${eventTabsData[selectedEventTab]}
                    </div>
                `
            },
            links: {
                title: "Get a Permanent Image Link",
                getHtml: () => `
                    <p>For Logoto to properly retrieve and deploy your icons, banners, or splashes down the line, the provided URL destination must remain permanently online. Because <strong>direct Discord URLs break quickly</strong>, you must rely on a dedicated third-party asset hosting platform.</p>
                    <p>Choose one of the recommended approaches below to generate a valid, permanent direct link:</p>
                    
                    <div class="mini-tabs">
                        <button class="mini-tab-btn ${selectedImageMethod === 'method-github' ? 'active-mini' : ''}" onclick="switchImageMethod('method-github', this)">GitHub (Recommended)</button>
                        <button class="mini-tab-btn ${selectedImageMethod === 'method-imgbb' ? 'active-mini' : ''}" onclick="switchImageMethod('method-imgbb', this)">ImgBB / Imgur</button>
                    </div>

                    <div id="image-method-container">
                        ${imageMethodsData[selectedImageMethod]}
                    </div>
                `
            }
        };

        const eventTabsData = {
            'event-logo': `
                <div class="event-sub-content">
                    <h3>Automated Server Icon Setup</h3><br>
                    <ol>
                        <li><strong>Create the Planning Channel:</strong>
                            <ul><li>The text channel name must strictly follow this exact syntax: <code>l-[DAY]-[MONTH]</code> (or use <code>/add-an-event</code>).</li>
                            <li>EXAMPLE: To schedule an icon update for Halloween (October 31st): <code>l-31-10</code></li></ul>
                        </li>
                        <li><strong>Prepare your Graphic File:</strong>
                            <ul>
                                <li>Obtain a <strong>permanent asset URL</strong> (via GitHub or ImgBB) that closes with a standard image file extension syntax (<code>.png</code>, <code>.jpg</code>, <code>.jpeg</code>, or <code>.gif</code>).</li>
                                <li><strong>Discord Formatting Guidelines:</strong> A perfectly square <strong>512 × 512 pixel</strong> canvas layout (Discord automatically masks profile pictures into circles).</li>
                            </ul>
                        </li>
                        <li><strong>Schedule the Update:</strong>
                            <ul><li>Open the settings of the channel created in step 1, select the <strong>Channel Topic</strong> input box, and paste your <strong>permanent direct asset URL</strong> inside.</li></ul>
                        </li>
                        <li><strong>Execution:</strong>
                            <ul><li>The bot processes the file and updates the server's icon at exactly 00:00 UTC on the chosen date. In case of channel duplication, the highest channel takes priority.</li></ul>
                        </li>
                    </ol>
                </div>
            `,
            'event-name': `
                <div class="event-sub-content">
                    <h3>Automated Server Name Setup</h3><br>
                    <ol>
                        <li><strong>Create the Planning Channel:</strong>
                            <ul><li>The text channel name must strictly match this layout format: <code>n-[DAY]-[MONTH]</code> (or use <code>/add-an-event</code>).</li>
                            <li>EXAMPLE: To adjust your server title on New Year's Day (January 1st): <code>n-1-1</code></li></ul>
                        </li>
                        <li><strong>Schedule the Update:</strong>
                            <ul><li>Open the properties of the designated channel.</li>
                            <li>Type your <strong>complete new server text string</strong> directly into the <strong>Channel Topic</strong> text input area.</li></ul>
                        </li>
                        <li><strong>Execution:</strong>
                            <ul><li>The bot updates the server title string at 00:00 UTC on the scheduled month and day (limited to one name switch daily, top channel rule applies).</li></ul>
                        </li>
                    </ol>
                </div>
            `,
            'event-banner': `
                <div class="event-sub-content">
                    <h3>Automated Server Banner Setup</h3><br>
                    <p><em>Note: Your community must maintain the required server Boost tier status (Level 2+) to deploy custom graphical banners.</em></p>
                    <ol>
                        <li><strong>Create the Planning Channel:</strong>
                            <ul><li>The text channel name must strictly match this layout format: <code>b-[DAY]-[MONTH]</code> (or use <code>/add-an-event</code>).</li>
                            <li>EXAMPLE: To deploy a festive holiday banner on Christmas Day (December 25th): <code>b-25-12</code></li></ul>
                        </li>
                        <li><strong>Prepare your Graphic File:</strong>
                            <ul>
                                <li>Generate and copy a <strong>permanent direct web URL</strong> pointing to an external static image asset (<code>.png</code>, <code>.jpg</code>).</li>
                                <li><strong>Discord Formatting Guidelines:</strong> Standard sizing targets are <strong>960 × 540 pixels</strong> using an aspect ratio of 16:9. Keep essential elements centered to avoid edge clipping.</li>
                            </ul>
                        </li>
                        <li><strong>Schedule the Update:</strong>
                            <ul><li>Paste this permanent direct image link into your channel's <strong>Channel Topic</strong> configuration box.</li></ul>
                        </li>
                        <li><strong>Execution:</strong>
                            <ul><li>Logoto applies the graphic asset to your server banner at 00:00 UTC. If multiple banner event channels exist for this day, only the highest one is compiled.</li></ul>
                        </li>
                    </ol>
                </div>
            `,
            'event-invite': `
                <div class="event-sub-content">
                    <h3>Automated Invite Splash Background Setup</h3><br>
                    <p><em>Note: Your community must maintain the required server Boost tier status (Level 1+) to deploy custom invite background splash graphics.</em></p>
                    <ol>
                        <li><strong>Create the Planning Channel:</strong>
                            <ul><li>The text channel name must strictly match this layout format: <code>i-[DAY]-[MONTH]</code> (or use <code>/add-an-event</code>).</li>
                            <li>EXAMPLE: To schedule a themed background splash for July 14th: <code>i-14-7</code></li></ul>
                        </li>
                        <li><strong>Prepare your Graphic File:</strong>
                            <ul>
                                <li>Generate and copy a <strong>permanent direct web URL</strong> pointing to an external static image asset.</li>
                                <li><strong>Discord Formatting Guidelines:</strong> Sizing targets require a crisp <strong>1920 × 1080 pixel</strong> footprint (standard 16:9 aspect ratio) to render correctly across mobile and desktop interfaces.</li>
                            </ul>
                        </li>
                        <li><strong>Schedule the Update:</strong>
                            <ul><li>Paste your permanent direct image URL straight into the channel's <strong>Channel Topic</strong> input area.</li></ul>
                        </li>
                        <li><strong>Execution:</strong>
                            <ul><li>As soon as the target day reaches 00:00 UTC, the illustration rolls out onto your web invite screens (highest listed channel takes priority if duplicate channels exist).</li></ul>
                        </li>
                    </ol>
                </div>
            `
        };

        const imageMethodsData = {
            'method-github': `
                <div class="mini-tab-content">
                    <h3>Hosting via GitHub (Ultra-Stable)</h3><br>
                    <ol>
                        <li><strong>Create a public repository:</strong> Go to GitHub, click <em>New repository</em>, name it, and make sure it is set to <strong>Public</strong>.</li>
                        <li><strong>Important (If repo is empty):</strong> Check the box that says <strong>"Add a README file"</strong> during creation. 
                            <br><small style="opacity:0.8;"><em>Why? If the repository is completely empty, GitHub hides the easy web interface upload tools and only shows raw Git code commands.</em></small>
                        </li>
                        <li><strong>Upload your files:</strong> Head over to your active repository page, click the <strong>"Add file"</strong> button near the top right, and select <strong>"Upload files"</strong>. Drag and drop your graphics (icons, backgrounds...) and click the green <strong>"Commit changes"</strong> button at the bottom to save.</li>
                        <li><strong>Get the Raw direct URL:</strong> Click on your uploaded file inside your repository view to open it. Then:
                            <ul>
                                <li>Click the <strong>"Raw"</strong> button located above the image display (or right-click the image -> <em>Open Image in New Tab</em>).</li>
                                <li>The target URL string sitting inside your browser address bar should now start exactly with: <code>https://raw.githubusercontent.com/...</code></li>
                            </ul>
                        </li>
                    </ol>
                    <div class="note" style="margin-top:15px;">
                        <strong>Manual Raw URL Override Hint:</strong><br>
                        If you cannot find the "Raw" button element, grab the generic GitHub file page URL structure, for example:<br>
                        <code>https://github.com/<b>username</b>/<b>repository</b>/blob/main/<b>image.png</b></code><br>
                        And swap the leading address segments yourself to instantly output the true direct raw address:<br>
                        <code>https://raw.githubusercontent.com/<b>username</b>/<b>repository</b>/main/<b>image.png</b></code>
                    </div>
                </div>
            `,
            'method-imgbb': `
                <div class="mini-tab-content">
                    <h3>Free Dedicated Image Hosts (ImgBB / Imgur)</h3><br>
                    <ol>
                       <li>Navigate to a dependable free image hosting utility such as <a href="https://imgbb.com" target="_blank" style="color: var(--vert-olive-clair);">ImgBB</a> or <a href="https://imgur.com" target="_blank" style="color: var(--vert-olive-clair);">Imgur</a>.</li>
                       <li>Upload your graphics file onto their servers. Make sure to choose the option that keeps files permanently online without an automatic expiration date.</li>
                       <li>Once processing finishes, look under their embedded code link generation settings and select the <strong>"Direct Link"</strong> option.</li>
                       <li>Double-check the generated URL structure: it must explicitly end with an image file extension suffix (e.g., <code>.png</code>, <code>.jpg</code>, <code>.jpeg</code>). If it hits a blurred wrapper text extension instead, Logoto will fail to trace the asset.</li>
                       <li>Copy this direct link and enter it safely into your Discord planning channel topic.</li>
                    </ol>
                </div>
            `
        };

        function updateContent() {
            let currentHash = window.location.hash.substring(1);
            
            if (!currentHash || !documentationData[currentHash]) {
                currentHash = "setup";
            }

            const contentArea = document.getElementById("doc-content");
            if (contentArea) {
                contentArea.innerHTML = `
                    <h1>${documentationData[currentHash].title}</h1>
                    ${documentationData[currentHash].getHtml()}
                `;
            }

            const links = document.querySelectorAll("#sidebar-menu a");
            links.forEach(link => {
                if (link.getAttribute("href") === `#${currentHash}`) {
                    link.classList.add("active-link");
                } else {
                    link.classList.remove("active-link");
                }
            });
        }

        function switchEventTab(tabId, clickedCard) {
            selectedEventTab = tabId;
            const cards = document.querySelectorAll('.event-card');
            cards.forEach(card => card.classList.remove('active-card'));
            clickedCard.classList.add('active-card');
            
            const subContainer = document.getElementById("event-sub-content-container");
            if (subContainer) {
                subContainer.innerHTML = eventTabsData[tabId];
            }
        }

        function switchImageMethod(methodId, clickedBtn) {
            selectedImageMethod = methodId;
            const btns = document.querySelectorAll('.mini-tab-btn');
            btns.forEach(btn => btn.classList.remove('active-mini'));
            clickedBtn.classList.add('active-mini');
            
            const container = document.getElementById("image-method-container");
            if (container) {
                container.innerHTML = imageMethodsData[methodId];
            }
        }

        window.addEventListener("hashchange", updateContent);
        window.addEventListener("DOMContentLoaded", updateContent);
    </script>
</body>
</html>
