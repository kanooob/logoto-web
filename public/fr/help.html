    <style>
        :root {
            --blanc: #F2F3F5;
            --vert-olive: #8c935d;
            --vert-olive-dark: #767d4f;
            --vert-olive-clair: #a3ab72;
            --gris-discord: #36393f; 
            --gris-footer: #2f3136;
            --gris-item: #3a3d42;
            --gris-code: #484c52;
            --note-bg: #3c3a2e;
            --warning-bg: #2c1a1a; 
            --warning-border: #f04747;
            --warning-text-important: #ff6b6b; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--gris-discord);
            color: var(--blanc);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo-container:hover .logo-img {
            transform: rotate(15deg) scale(1.05);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: var(--blanc);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            opacity: 0.8;
            transition: opacity 0.2s, color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            opacity: 1;
            color: var(--vert-olive-clair);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lang-container {
            position: relative;
            display: inline-block;
        }

        .lang-select {
            background: none;
            border: none;
            color: var(--blanc);
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            padding: 10px 5px;
            text-decoration: none;
        }

        .lang-dropdown {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background-color: var(--gris-footer);
            border: 1px solid var(--vert-olive);
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
            z-index: 10;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }

        .lang-dropdown a {
            display: block;
            color: var(--blanc);
            padding: 8px 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .lang-dropdown a:hover {
            background-color: var(--vert-olive);
        }

        .lang-container:hover .lang-dropdown,
        .lang-container:focus-within .lang-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .btn-nav {
            background-color: var(--vert-olive);
            color: var(--blanc);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.2s;
        }

        .btn-nav:hover {
            background-color: var(--vert-olive-dark);
            transform: translateY(-1px);
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 40px 50px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            width: 250px;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            padding-right: 40px;
            flex-shrink: 0;
        }

        .sidebar a {
            color: var(--blanc);
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            opacity: 0.6;
            transition: opacity 0.2s, color 0.2s, padding-left 0.2s;
            white-space: nowrap;
        }

        .sidebar a:hover, .sidebar a.active-link {
            opacity: 1;
            color: var(--vert-olive-clair);
            padding-left: 4px;
        }

        .sidebar a.setup {
            letter-spacing: 1px;
            font-size: 16px;
        }

        .divider {
            width: 2px;
            min-width: 2px;
            background-color: rgba(242, 243, 245, 0.15);
            align-self: stretch;
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .content-area {
            flex: 1;
            min-width: 0;
            padding-left: 40px;
            animation: fadeIn 0.4s ease-out;
        }

        .content-area h1 {
            font-size: 34px;
            color: var(--vert-olive-clair);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .content-area h2 {
            font-size: 26px;
            margin-top: 35px;
            margin-bottom: 15px;
            color: var(--vert-olive-clair);
            border-bottom: 1px solid rgba(242, 243, 245, 0.15);
            padding-bottom: 5px;
        }

        .content-area p {
            font-size: 16px;
            margin-bottom: 15px;
            opacity: 0.85;
        }

        .command-list {
            list-style-type: none;
            padding: 0;
            margin: 20px 0;
        }

            margin-bottom: 10px;
            background-color: var(--gris-item);
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
        }

        code {
            background-color: var(--gris-code);
            padding: 3px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
            color: #ffffff;
            font-weight: bold;
            word-break: break-all;
            white-space: pre-wrap;
        }

        ol {
            padding-left: 20px;
            margin: 20px 0;
        }

        ol li {
            margin-bottom: 15px;
            font-size: 16px;
        }

        ol ul {
            list-style-type: disc;
            padding-left: 20px;
            margin-top: 5px;
        }

        ol ul li {
            margin-bottom: 5px;
            font-size: 15px;
            opacity: 0.9;
        }

        .note {
            background-color: var(--note-bg);
            border-left: 5px solid var(--vert-olive);
            padding: 15px;
            margin-top: 25px;
            border-radius: 4px;
            color: #ffffff;
        }

        .note strong {
            color: var(--vert-olive-clair);
        }

        .warning-box {
            background-color: var(--warning-bg);
            border-left: 6px solid var(--warning-border);
            padding: 18px;
            margin: 25px 0;
            border-radius: 6px;
            color: #ffffff; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .warning-box strong {
            color: var(--warning-text-important);
            font-weight: 800;
        }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 25px 0;
        }

        .event-card {
            background-color: var(--gris-item);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 25px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .event-card h3 {
            color: var(--blanc);
            font-size: 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.2s ease;
        }

        .event-card:hover {
            transform: translateY(-2px);
            border-color: var(--vert-olive);
            background-color: rgba(140, 147, 93, 0.1);
        }

        .event-card:hover h3 {
            color: var(--vert-olive-clair);
        }

        .event-card.active-card {
            border-color: var(--vert-olive-clair);
            background-color: rgba(140, 147, 93, 0.15);
        }

        .event-card.active-card h3 {
            color: var(--vert-olive-clair);
        }

        .event-card p {
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 0;
        }

        .event-sub-content {
            background-color: var(--gris-footer);
            padding: 25px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid var(--vert-olive-clair);
            animation: fadeIn 0.3s ease-out;
        }

        .mini-tabs {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            align-items: center;
        }

        .mini-tab-btn {
            background-color: var(--gris-code);
            color: var(--blanc);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .mini-tab-btn:hover {
            background-color: var(--vert-olive);
        }

        .mini-tab-btn.active-mini {
            background-color: var(--vert-olive-clair);
            color: var(--gris-discord);
        }

        .mini-tab-content {
            background-color: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            width: 100%;
        }

        .mini-tab-content ol, .mini-tab-content ul {
            width: 100%;
        }

        .mini-tab-content li {
            width: 100%;
        }

        footer {
            background-color: var(--gris-footer);
            padding: 25px 50px;
            width: 100%;
            margin-top: auto;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            font-size: 14px;
            opacity: 0.7;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--blanc);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--vert-olive-clair);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
                flex-direction: column;
                gap: 20px;
            }

            nav {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .nav-links {
                justify-content: center;
                flex-wrap: wrap;
                gap: 20px;
            }

            .nav-right {
                width: 100%;
                justify-content: center;
            }

            .main-container {
                flex-direction: column;
                padding: 20px;
            }

            .sidebar {
                width: 100%;
                padding-right: 0;
                padding-bottom: 20px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
            }

            .divider {
                width: 100%;
                height: 2px;
                margin-bottom: 20px;
            }

            .content-area {
                padding-left: 0;
            }

            .event-grid {
                grid-template-columns: 1fr;
            }

            .footer-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>

                    <ol>
                        <li><strong>Un seul changement par jour :</strong> Un changement par type d'élément maximum par tranche de 24h.</li>
                        <li><strong>Gestion des doublons :</strong> Si plusieurs salons entrent en conflit, c'est le salon situé le plus haut dans la liste de vos catégories Discord qui prime.</li>
                    </ol>
                `
            },
            commands: {
                title: "Les Commandes du Bot Logoto",
                getHtml: () => `
                    <p>Découvrez la liste complète des commandes Slash intégrées :</p>
                    <ul class="command-list">
                        <li><code>/setup</code> : Configure la structure initiale.</li>
                        <li><code>/add-an-event</code> : Crée automatiquement un salon de planification au bon format.</li>
                        <li><code>/help</code> : Affiche l'aide complète.</li>
                        <li><code>/info</code> : Statut global du bot.</li>
                    </ul>
                `
            },
            events: {
                title: "Ajouter un événement",
                getHtml: () => `
                    <div class="warning-box">
                        <strong>⚠️ ATTENTION :</strong> Ne copiez pas de liens d'images depuis un salon Discord (liens CDN). Ils expirent après 24 heures. Utilisez un lien persistant.
                    </div>
                    <div class="event-grid">
                        <div class="event-card ${selectedEventTab === 'event-logo' ? 'active-card' : ''}" onclick="switchEventTab('event-logo', this)">
                            <h3>Changement de Logo</h3>
                            <p>Automatisez la mise à jour de la photo de profil du serveur.</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-name' ? 'active-card' : ''}" onclick="switchEventTab('event-name', this)">
                            <h3>Changement de Nom</h3>
                            <p>Modifiez automatiquement le titre textuel de votre communauté.</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-banner' ? 'active-card' : ''}" onclick="switchEventTab('event-banner', this)">
                            <h3>Changement de Bannière</h3>
                            <p>Planifiez une illustration de haut de page (Niveau 2 de Boost).</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-invite' ? 'active-card' : ''}" onclick="switchEventTab('event-invite', this)">
                            <h3>Fond d'invitation</h3>
                            <p>Personnalisez l'arrière-plan de vos invitations (Niveau 1 de Boost).</p>
                        </div>
                    </div>
                    <div id="event-sub-content-container">${eventTabsData[selectedEventTab]}</div>
                `
            },
            links: {
                title: "Obtenir un lien d'image persistant",
                getHtml: () => `
                    <p>Choisissez l'une des méthodes recommandées pour stocker vos images à long terme :</p>
                    <div class="mini-tabs">
                        <button class="mini-tab-btn ${selectedImageMethod === 'method-github' ? 'active-mini' : ''}" onclick="switchImageMethod('method-github', this)">GitHub (Recommandé)</button>
                        <button class="mini-tab-btn ${selectedImageMethod === 'method-imgbb' ? 'active-mini' : ''}" onclick="switchImageMethod('method-imgbb', this)">ImgBB / Imgur</button>
                    </div>
                    <div id="image-method-container">${imageMethodsData[selectedImageMethod]}</div>
                `
            }
        };

        function renderContent() {
            const hash = window.location.hash.replace('#', '') || 'setup';
            const contentArea = document.getElementById('doc-content');
            const sidebarLinks = document.querySelectorAll('.sidebar a');
            
            sidebarLinks.forEach(link => {
                if(link.getAttribute('href') === '#' + hash) {
                    link.classList.add('active-link');
                } else {
                    link.classList.remove('active-link');
                }
            });

            if (documentationData[hash]) {
                contentArea.innerHTML = `
                    <h1>${documentationData[hash].title}</h1>
                    ${documentationData[hash].getHtml()}
                `;
            }
        }

        function switchEventTab(tabId, element) {
            selectedEventTab = tabId;
            document.querySelectorAll('.event-card').forEach(card => card.classList.remove('active-card'));
            element.classList.add('active-card');
            document.getElementById('event-sub-content-container').innerHTML = eventTabsData[tabId];
        }

        function switchImageMethod(methodId, element) {
            selectedImageMethod = methodId;
            document.querySelectorAll('.mini-tab-btn').forEach(btn => btn.classList.remove('active-mini'));
            element.classList.add('active-mini');
            document.getElementById('image-method-container').innerHTML = imageMethodsData[methodId];
        }

        window.addEventListener('hashchange', renderContent);
        window.addEventListener('DOMContentLoaded', renderContent);
    </script>
</body>
</html>
