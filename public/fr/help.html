    <style>
        :root {
            --blanc: #F2F3F5;
            --vert-olive: #8c935d;
            --vert-olive-dark: #767d4f;
            --vert-olive-clair: #a3ab72;
            --gris-discord: #36393f; 
            --gris-footer: #2f3136;
            --gris-item: #3a3d42;
            --gris-code: #484c52;
            --note-bg: #3c3a2e;
            --warning-bg: #2c1a1a; 
            --warning-border: #f04747;
            --warning-text-important: #ff6b6b; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--gris-discord);
            color: var(--blanc);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo-container:hover .logo-img {
            transform: rotate(15deg) scale(1.05);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: var(--blanc);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            opacity: 0.8;
            transition: opacity 0.2s, color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            opacity: 1;
            color: var(--vert-olive-clair);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lang-container {
            position: relative;
            display: inline-block;
        }

        .lang-select {
            background: none;
            border: none;
            color: var(--blanc);
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            padding: 10px 5px;
            text-decoration: none;
        }

        .lang-dropdown {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background-color: var(--gris-footer);
            border: 1px solid var(--vert-olive);
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
            z-index: 10;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }

        .lang-dropdown a {
            display: block;
            color: var(--blanc);
            padding: 8px 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .lang-dropdown a:hover {
            background-color: var(--vert-olive);
        }

        .lang-container:hover .lang-dropdown,
        .lang-container:focus-within .lang-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .btn-nav {
            background-color: var(--vert-olive);
            color: var(--blanc);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.2s;
        }

        .btn-nav:hover {
            background-color: var(--vert-olive-dark);
            transform: translateY(-1px);
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 40px 50px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            width: 250px;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            padding-right: 40px;
            flex-shrink: 0;
        }

        .sidebar a {
            color: var(--blanc);
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            opacity: 0.6;
            transition: opacity 0.2s, color 0.2s, padding-left 0.2s;
            white-space: nowrap;
        }

        .sidebar a:hover, .sidebar a.active-link {
            opacity: 1;
            color: var(--vert-olive-clair);
            padding-left: 4px;
        }

        .sidebar a.setup {
            letter-spacing: 1px;
            font-size: 16px;
        }

        .divider {
            width: 2px;
            min-width: 2px;
            background-color: rgba(242, 243, 245, 0.15);
            align-self: stretch;
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .content-area {
            flex: 1;
            min-width: 0;
            padding-left: 40px;
            animation: fadeIn 0.4s ease-out;
        }

        .content-area h1 {
            font-size: 34px;
            color: var(--vert-olive-clair);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .content-area h2 {
            font-size: 26px;
            margin-top: 35px;
            margin-bottom: 15px;
            color: var(--vert-olive-clair);
            border-bottom: 1px solid rgba(242, 243, 245, 0.15);
            padding-bottom: 5px;
        }

        .content-area p {
            font-size: 16px;
            margin-bottom: 15px;
            opacity: 0.85;
        }

        .command-list {
            list-style-type: none;
            padding: 0;
            margin: 20px 0;
        }
        
        .command-list li {
            margin-bottom: 10px;
            background-color: var(--gris-item);
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
        }

        code {
            background-color: var(--gris-code);
            padding: 3px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
            color: #ffffff;
            font-weight: bold;
            word-break: break-all;
            white-space: pre-wrap;
        }

        ol {
            padding-left: 20px;
            margin: 20px 0;
        }

        ol li {
            margin-bottom: 15px;
            font-size: 16px;
        }

        ol ul {
            list-style-type: disc;
            padding-left: 20px;
            margin-top: 5px;
        }

        ol ul li {
            margin-bottom: 5px;
            font-size: 15px;
            opacity: 0.9;
        }

        .note {
            background-color: var(--note-bg);
            border-left: 5px solid var(--vert-olive);
            padding: 15px;
            margin-top: 25px;
            border-radius: 4px;
            color: #ffffff;
        }

        .note strong {
            color: var(--vert-olive-clair);
        }

        .warning-box {
            background-color: var(--warning-bg);
            border-left: 6px solid var(--warning-border);
            padding: 18px;
            margin: 25px 0;
            border-radius: 6px;
            color: #ffffff; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .warning-box strong {
            color: var(--warning-text-important);
            font-weight: 800;
        }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 25px 0;
        }

        .event-card {
            background-color: var(--gris-item);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 25px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .event-card h3 {
            color: var(--blanc);
            font-size: 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.2s ease;
        }

        .event-card:hover {
            transform: translateY(-2px);
            border-color: var(--vert-olive);
            background-color: rgba(140, 147, 93, 0.1);
        }

        .event-card:hover h3 {
            color: var(--vert-olive-clair);
        }

        .event-card.active-card {
            border-color: var(--vert-olive-clair);
            background-color: rgba(140, 147, 93, 0.15);
        }

        .event-card.active-card h3 {
            color: var(--vert-olive-clair);
        }

        .event-card p {
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 0;
        }

        .event-sub-content {
            background-color: var(--gris-footer);
            padding: 25px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid var(--vert-olive-clair);
            animation: fadeIn 0.3s ease-out;
        }

        .mini-tabs {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            align-items: center;
        }

        .mini-tab-btn {
            background-color: var(--gris-code);
            color: var(--blanc);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .mini-tab-btn:hover {
            background-color: var(--vert-olive);
        }

        .mini-tab-btn.active-mini {
            background-color: var(--vert-olive-clair);
            color: var(--gris-discord);
        }

        .mini-tab-content {
            background-color: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            width: 100%;
        }

        .mini-tab-content ol, .mini-tab-content ul {
            width: 100%;
        }

        .mini-tab-content li {
            width: 100%;
        }

        footer {
            background-color: var(--gris-footer);
            padding: 25px 50px;
            width: 100%;
            margin-top: auto;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            font-size: 14px;
            opacity: 0.7;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--blanc);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--vert-olive-clair);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
                flex-direction: column;
                gap: 20px;
            }

            nav {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .nav-links {
                justify-content: center;
                flex-wrap: wrap;
                gap: 20px;
            }

            .nav-right {
                width: 100%;
                justify-content: center;
            }

            .main-container {
                flex-direction: column;
                padding: 20px;
            }

            .sidebar {
                width: 100%;
                padding-right: 0;
                padding-bottom: 20px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
            }

            .divider {
                width: 100%;
                height: 2px;
                margin-bottom: 20px;
            }

            .content-area {
                padding-left: 0;
            }

            .event-grid {
                grid-template-columns: 1fr;
            }

            .footer-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>

    <div class="main-container">

    <footer>
        <div class="footer-content">
            <p>Ce site est hébergé sur Render. Logoto est un projet personnel.</p>
            <div class="footer-links">
                <a href="/tos">Conditions d'Utilisation (ToS)</a>

    <script>
        let selectedEventTab = 'event-logo';
        let selectedImageMethod = 'method-github';

        const documentationData = {
            setup: {
                title: "Configuration (Setup)",
                getHtml: () => `
                    <p>Je suis le bot spécialisé dans l'automatisation du changement de logo, de nom, de bannière et d'image d'invitation de votre serveur Discord, sans nécessiter de configurations ou de lignes de code complexes.</p>
                    <h2>Premiers pas</h2>
                    <p>Pour commencer à utiliser le bot au maximum de ses capacités, lancez simplement la commande de configuration initiale.</p>
                    <ul class="command-list">
                        <li><code>/setup</code> : Première commande à faire. Crée automatiquement la catégorie et les salons nécessaires (Logoto, log-logoto) pour un démarrage rapide.</li>
                    </ul>
                    <div class="note">
                        <strong>NOTE IMPORTANTE :</strong> Le salon nommé <code>log-logoto</code> <strong>doit impérativement exister</strong> sur votre serveur pour assurer le suivi technique.
                        <br><br>
                        Le bot utilise ce salon pour envoyer ses messages techniques quotidiens de chargement (<code>l-Loading</code>, <code>n-Loading</code>, <code>b-Loading</code> ou <code>i-Loading</code>). Attention, <strong>ces messages ne sont envoyés que si un changement est effectivement programmé le jour même</strong>. S'il n'y a aucun événement, aucun log n'est posté. La commande <code>/setup</code> s'occupe de créer ce salon proprement pour vous.
                    </div>
                `
            },
            "how-it-works": {
                title: "Fonctionnement Général",
                getHtml: () => `
                    <p>Logoto surveille de manière autonome la présence de salons textuels spécifiques au sein de votre serveur Discord pour planifier et exécuter vos mises à jour esthétiques.</p>
                    
                    <div class="note" style="margin-bottom: 20px; background-color: #2b3a2e; border-left: 5px solid var(--vert-olive-clair);">
                        <strong>⏰ Planification horaire :</strong> Toutes les mises à jour et vérifications automatiques configurées sur votre serveur s'exécutent chaque jour précisément à <strong>00h00 UTC</strong>.
                    </div>

                    <h2>Règles de priorité et limites</h2>
                    <p>Pour garantir la stabilité du serveur et respecter les quotas de l'API Discord, Logoto applique des règles strictes de gestion quotidienne :</p>
                    <ol>
                        <li><strong>Un seul changement par type et par jour :</strong> Le nom du serveur peut changer une fois par jour, le logo une fois, la bannière une fois, et le fond d'invitation une fois.</li>
                        <li><strong>Modifications simultanées :</strong> Il est tout à fait possible de changer le logo ET le nom (ou tout autre élément) le même jour. Les deux actions s'exécuteront à 00h00 UTC.</li>
                        <li><strong>Gestion des doublons (Priorité visuelle) :</strong> Si vous avez créé par erreur plusieurs salons pour le même élément le même jour (par exemple deux salons <code>l-25-12</code> avec des logos différents), <strong>c'est le salon situé le plus haut dans la liste de vos catégories Discord qui prime</strong> et qui sera appliqué par le bot.</li>
                    </ol>
                `
            },
            commands: {
                title: "Les Commandes du Bot Logoto",
                getHtml: () => `
                    <p>Découvrez la liste complète des commandes intégrées disponibles directement avec le système de Slash Commands de Discord :</p>
                    <ul class="command-list">
                        <li><code>/setup</code> : Première commande à faire. Crée automatiquement la catégorie et les salons nécessaires (Logoto, log-logoto) pour un démarrage rapide.</li>
                        <li><code>/add-an-event</code> : Crée automatiquement un salon de planification au bon format pour vos événements futurs.</li>
                        <li><code>/help</code> : Affiche la liste des commandes du bot (ou cette page de documentation).</li>
                        <li><code>/info</code> : Renvoie toutes les informations utiles concernant l'état actuel et le statut du bot.</li>
                        <li><code>/ping</code> : Obtenez la latence en temps réel entre le bot et l'API Discord.</li>
                        <li><code>/invite</code> : Obtenez le lien d'invitation officiel pour ajouter Logoto sur votre propre serveur.</li>
                        <li><code>/support</code> : Rejoignez notre serveur de support pour poser vos questions ou obtenir de l'aide.</li>
                    </ul>
                `
            },
            events: {
                title: "Ajouter un événement",
                getHtml: () => `
                    <p>Sélectionnez ci-dessous l'élément graphique ou textuel que vous souhaitez planifier automatiquement sur votre serveur Discord pour afficher le tutoriel détaillé de mise en place :</p>
                    
                    <div class="warning-box">
                        <strong>⚠️ ATTENTION CONCERNANT LES IMAGES :</strong> Ne copiez jamais de liens d'images directement depuis un salon Discord (liens CDN Discord). Ces derniers possèdent désormais des clés de sécurité temporaires et <strong>expirent au bout de 24 à 48 heures</strong>. Si le lien expire avant la date de l'événement, Logoto ne pourra pas charger votre image. Référez-vous à la rubrique <a href="#links" style="color: var(--warning-text-important); font-weight: bold; text-decoration: underline;">Liens d'images</a> pour régler ce problème.
                    </div>

                    <div class="event-grid">
                        <div class="event-card ${selectedEventTab === 'event-logo' ? 'active-card' : ''}" onclick="switchEventTab('event-logo', this)">
                            <h3>Changement de Logo</h3>
                            <p>Automatisez la mise à jour de la photo de profil du serveur à une date fixe.</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-name' ? 'active-card' : ''}" onclick="switchEventTab('event-name', this)">
                            <h3>Changement de Nom</h3>
                            <p>Modifiez automatiquement le titre textuel d'affichage de votre communauté.</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-banner' ? 'active-card' : ''}" onclick="switchEventTab('event-banner', this)">
                            <h3>Changement de Bannière</h3>
                            <p>Planifiez une illustration en haut de la liste de vos salons (Niveau 2 de Boost).</p>
                        </div>
                        <div class="event-card ${selectedEventTab === 'event-invite' ? 'active-card' : ''}" onclick="switchEventTab('event-invite', this)">
                            <h3>Fond d'invitation</h3>
                            <p>Personnalisez l'arrière-plan de vos fenêtres d'invitations (Niveau 1 de Boost).</p>
                        </div>
                    </div>

                    <div id="event-sub-content-container">
                        ${eventTabsData[selectedEventTab]}
                    </div>
                `
            },
            links: {
                title: "Obtenir un lien d'image persistant",
                getHtml: () => `
                    <p>Pour que Logoto puisse appliquer vos logos, bannières ou images d'invitation à l'avenir, l'URL que vous lui fournissez doit rester accessible de manière permanente. Comme <strong>les liens directs Discord expirent rapidement</strong>, vous devez utiliser une solution tierce d'hébergement permanent.</p>
                    <p>Choisissez l'une des méthodes recommandées ci-dessous pour générer un lien permanent valide :</p>
                    
                    <div class="mini-tabs">
                        <button class="mini-tab-btn ${selectedImageMethod === 'method-github' ? 'active-mini' : ''}" onclick="switchImageMethod('method-github', this)">GitHub (Recommandé)</button>
                        <button class="mini-tab-btn ${selectedImageMethod === 'method-imgbb' ? 'active-mini' : ''}" onclick="switchImageMethod('method-imgbb', this)">ImgBB / Imgur</button>
                    </div>

                    <div id="image-method-container">

        function updateContent() {
            let currentHash = window.location.hash.substring(1);
            
            if (!currentHash || !documentationData[currentHash]) {
                currentHash = "setup";
            }

            const contentArea = document.getElementById("doc-content");
            if (contentArea) {
                contentArea.innerHTML = `
                    <h1>${documentationData[currentHash].title}</h1>
                    ${documentationData[currentHash].getHtml()}
                `;
            }

            const links = document.querySelectorAll("#sidebar-menu a");
            links.forEach(link => {
                if (link.getAttribute("href") === `#${currentHash}`) {
                    link.classList.add("active-link");
                } else {
                    link.classList.remove("active-link");
                }
            });
        }

        function switchEventTab(tabId, clickedCard) {
            selectedEventTab = tabId;
            const cards = document.querySelectorAll('.event-card');
            cards.forEach(card => card.classList.remove('active-card'));
            clickedCard.classList.add('active-card');
            
            const subContainer = document.getElementById("event-sub-content-container");
            if (subContainer) {
                subContainer.innerHTML = eventTabsData[tabId];
            }
        }

        function switchImageMethod(methodId, clickedBtn) {
            selectedImageMethod = methodId;
            const btns = document.querySelectorAll('.mini-tab-btn');
            btns.forEach(btn => btn.classList.remove('active-mini'));
            clickedBtn.classList.add('active-mini');
            
            const container = document.getElementById("image-method-container");
            if (container) {
                container.innerHTML = imageMethodsData[methodId];
            }
        }

        window.addEventListener("hashchange", updateContent);
        window.addEventListener("DOMContentLoaded", updateContent);
